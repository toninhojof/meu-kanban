<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Meu Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0f1117;
  --surface:   #1a1d27;
  --card:      #21253a;
  --border:    rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.13);
  --text:      #e8eaf0;
  --muted:     #7b8099;
  --hover:     #252a3d;
  --accent:    #378ADD;
  --font:      'DM Sans', system-ui, sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Login ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.login-box {
  background: var(--surface); border: 0.5px solid var(--border-md);
  border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 18px;
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.login-logo .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; }
.login-logo span { font-size: 17px; font-weight: 500; color: var(--text); }
.login-box h2 { font-size: 22px; font-weight: 500; color: var(--text); }
.login-box p  { font-size: 13px; color: var(--muted); margin-top: -10px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: var(--muted); }
.field input {
  background: var(--card); border: 0.5px solid var(--border-md);
  border-radius: 8px; padding: 9px 12px; color: var(--text);
  font-family: var(--font); font-size: 14px; outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }
.login-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: background 0.15s;
}
.login-btn:hover { background: #2a73c5; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { font-size: 12px; color: #f87171; background: rgba(226,75,74,0.12); border-radius: 6px; padding: 8px 10px; display: none; }
.login-error.show { display: block; }

/* ── App shell ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
#app.visible { display: flex; }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface); flex-shrink: 0; gap: 12px; flex-wrap: wrap;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; }
.project-name { font-size: 15px; font-weight: 500; color: var(--text); }
.project-name span { color: var(--muted); font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.user-info { font-size: 12px; color: var(--muted); }
.logout-btn {
  font-size: 12px; padding: 4px 10px; border-radius: 99px;
  border: 0.5px solid var(--border-md); background: none;
  cursor: pointer; color: var(--muted); font-family: var(--font);
  display: flex; align-items: center; gap: 5px; transition: all 0.12s;
}
.logout-btn:hover { color: var(--text); background: var(--hover); }
.stats { display: flex; gap: 10px; }
.stat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-bottom: 0.5px solid var(--border);
  background: var(--surface); flex-shrink: 0; flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
.filter-btn {
  font-size: 12px; padding: 4px 11px; border-radius: 99px;
  border: 0.5px solid var(--border-md); background: none;
  cursor: pointer; color: var(--muted); font-family: var(--font);
  transition: all 0.12s; display: flex; align-items: center; gap: 5px;
}
.filter-btn:hover { background: var(--hover); color: var(--text); }
.filter-btn.active { border-width: 1.5px; }
.filter-btn.f-all.active    { background: var(--hover); color: var(--text); border-color: rgba(255,255,255,0.25); }
.filter-btn.f-urgent.active { background: rgba(226,75,74,0.15);  color: #f87171; border-color: rgba(226,75,74,0.5); }
.filter-btn.f-high.active   { background: rgba(239,159,39,0.13); color: #fbbf24; border-color: rgba(239,159,39,0.45); }
.filter-btn.f-medium.active { background: rgba(55,138,221,0.13); color: #60a5fa; border-color: rgba(55,138,221,0.45); }
.filter-btn.f-low.active    { background: rgba(99,153,34,0.13);  color: #86efac; border-color: rgba(99,153,34,0.45); }
.pri-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Board ── */
.board-wrap { flex: 1; overflow-x: auto; padding: 20px 24px 28px; }
.board-wrap::-webkit-scrollbar { height: 5px; }
.board-wrap::-webkit-scrollbar-track { background: transparent; }
.board-wrap::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }
.board { display: flex; gap: 12px; align-items: flex-start; min-height: calc(100vh - 140px); }

/* ── Loading overlay ── */
.loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 100;
}
.loading.hidden { display: none; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border-md); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: var(--muted); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 0.5px solid var(--border-md);
  border-radius: 8px; padding: 10px 18px; font-size: 13px; color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 0;
  transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 200;
}
.toast.show { opacity: 1; }

/* ── Column ── */
.col {
  flex: 0 0 230px; background: var(--surface);
  border-radius: 12px; border: 0.5px solid var(--border);
  padding: 10px; display: flex; flex-direction: column;
  gap: 7px; min-height: 100px; transition: background 0.15s, border-color 0.15s;
}
.col.drag-over { background: rgba(55,138,221,0.08); border-color: rgba(55,138,221,0.35); }
.col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 2px 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 1px;
}
.col-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text); }
.col-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.col-count {
  font-size: 11px; color: var(--muted);
  background: rgba(255,255,255,0.05); border: 0.5px solid var(--border);
  border-radius: 99px; padding: 0 7px; height: 17px; display: flex; align-items: center;
}
.col-add-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 17px; padding: 0;
  display: flex; align-items: center; transition: color 0.15s;
}
.col-add-btn:hover { color: var(--text); }

/* ── Card ── */
.card {
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: 8px; padding: 10px 12px; cursor: grab;
  user-select: none; transition: border-color 0.12s, opacity 0.12s; position: relative;
}
.card:hover { border-color: var(--border-md); }
.card:active { cursor: grabbing; }
.card.dragging { opacity: 0.35; }
.card.hidden { display: none; }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.pri-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 99px; display: flex; align-items: center; gap: 4px; }
.pri-urgent { background: rgba(226,75,74,0.18);  color: #f87171; }
.pri-high   { background: rgba(239,159,39,0.15); color: #fbbf24; }
.pri-medium { background: rgba(55,138,221,0.15); color: #60a5fa; }
.pri-low    { background: rgba(99,153,34,0.13);  color: #86efac; }
.card-actions { display: none; gap: 2px; }
.card:hover .card-actions { display: flex; }
.card-btn {
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 2px; font-size: 14px; border-radius: 4px;
  display: flex; align-items: center; transition: color 0.12s, background 0.12s;
}
.card-btn:hover { color: #f87171; background: rgba(226,75,74,0.15); }
.card-title { font-size: 13px; font-weight: 400; color: var(--text); line-height: 1.45; margin-bottom: 7px; }
.card-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
.tag-blue   { background: rgba(55,138,221,0.18);  color: #60a5fa; }
.tag-green  { background: rgba(99,153,34,0.15);   color: #86efac; }
.tag-amber  { background: rgba(239,159,39,0.15);  color: #fbbf24; }
.tag-purple { background: rgba(127,119,221,0.18); color: #a5b4fc; }
.tag-pink   { background: rgba(212,83,126,0.15);  color: #f9a8d4; }
.avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; margin-left: auto; }
.av-a { background: rgba(55,138,221,0.25);  color: #60a5fa; }
.av-b { background: rgba(29,158,117,0.25);  color: #6ee7b7; }
.av-c { background: rgba(212,83,126,0.22);  color: #f9a8d4; }
.av-d { background: rgba(239,159,39,0.20);  color: #fbbf24; }

/* ── Add card btn ── */
.add-card-btn {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: 5px 2px; border-radius: 6px;
  transition: color 0.12s, background 0.12s; width: 100%; font-family: var(--font);
}
.add-card-btn:hover { color: var(--text); background: var(--hover); }

/* ── Forms ── */
.new-card-form {
  background: var(--hover); border: 0.5px solid var(--border-md);
  border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px;
}
.new-card-form input,
.new-card-form select {
  width: 100%; font-size: 13px; border: 0.5px solid var(--border-md);
  border-radius: 6px; padding: 6px 8px;
  background: var(--card); color: var(--text); outline: none; font-family: var(--font);
}
.new-card-form input:focus,
.new-card-form select:focus { border-color: rgba(55,138,221,0.5); }
.new-card-form select option { background: var(--card); color: var(--text); }
.form-row { display: flex; gap: 4px; }
.form-btn {
  flex: 1; font-size: 12px; padding: 5px; border-radius: 6px;
  cursor: pointer; border: 0.5px solid var(--border-md);
  font-family: var(--font); transition: background 0.12s;
}
.form-btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
.form-btn.primary:hover { background: #2a73c5; }
.form-btn.cancel  { background: none; color: var(--muted); }
.form-btn.cancel:hover { background: var(--border); color: var(--text); }
.add-col-area {
  flex: 0 0 200px; border: 1.5px dashed var(--border-md); border-radius: 12px;
  padding: 10px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s, background 0.15s; min-height: 80px;
}
.add-col-area:hover { border-color: rgba(255,255,255,0.2); background: var(--surface); }
.add-col-area span { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.new-col-form {
  flex: 0 0 200px; background: var(--surface); border-radius: 12px;
  border: 0.5px solid var(--border-md); padding: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.new-col-form input {
  font-size: 13px; border: 0.5px solid var(--border-md); border-radius: 6px;
  padding: 6px 8px; background: var(--card); color: var(--text);
  outline: none; font-family: var(--font);
}
.empty-col { font-size: 12px; color: var(--muted); text-align: center; padding: 12px 0; font-style: italic; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Carregando...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo"><i class="ti ti-layout-kanban"></i></div>
      <span>Kanban do Time</span>
    </div>
    <div>
      <h2>Entrar</h2>
      <p style="margin-top:6px">Acesso restrito ao time</p>
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" onkeydown="loginKey(event)">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="loginKey(event)">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <i class="ti ti-login"></i> Entrar
    </button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo"><i class="ti ti-layout-kanban"></i></div>
      <div class="project-name">Meu Time <span>/ Board</span></div>
    </div>
    <div class="topbar-right">
      <div class="stats" id="stats"></div>
      <span class="user-info" id="user-info"></span>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="filter-label">Prioridade:</span>
    <button class="filter-btn f-all active"    onclick="setFilter('all')">Todas</button>
    <button class="filter-btn f-urgent" onclick="setFilter('urgent')"><span class="pri-dot" style="background:#f87171"></span>Urgente</button>
    <button class="filter-btn f-high"   onclick="setFilter('high')"><span class="pri-dot" style="background:#fbbf24"></span>Alta</button>
    <button class="filter-btn f-medium" onclick="setFilter('medium')"><span class="pri-dot" style="background:#60a5fa"></span>Média</button>
    <button class="filter-btn f-low"    onclick="setFilter('low')"><span class="pri-dot" style="background:#86efac"></span>Baixa</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<script>
// ── Supabase ──
const SUPA_URL = 'https://gspwlxsxyogucwaivtrx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcHdseHN4eW9ndWN3YWl2dHJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODk3MjQsImV4cCI6MjA5Nzk2NTcyNH0.xu8OhYJ7inVc-4ZajYTNgf8rF8Blvw08UWiD2RtFRuE';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const COL_COLORS  = ['#6B7280','#378ADD','#BA7511','#639922','#7F77DD','#D85A30'];
const TAG_CLASSES = ['tag-blue','tag-green','tag-amber','tag-purple','tag-pink'];
const AVATARS     = [{i:'AM',c:'av-a'},{i:'BJ',c:'av-b'},{i:'CR',c:'av-c'},{i:'DK',c:'av-d'}];
const PRIORITIES  = [
  {id:'urgent',label:'Urgente',badge:'pri-urgent',dot:'#f87171'},
  {id:'high',  label:'Alta',   badge:'pri-high',  dot:'#fbbf24'},
  {id:'medium',label:'Média',  badge:'pri-medium', dot:'#60a5fa'},
  {id:'low',   label:'Baixa',  badge:'pri-low',   dot:'#86efac'},
];

let activeFilter = 'all';
let state = { cols: [] };
let dragCard = null, dragCol = null;

// ── Helpers ──
function uid()  { return 'k' + Math.random().toString(36).slice(2,10); }
function cuid() { return 'c' + Math.random().toString(36).slice(2,10); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showLoading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Auth ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { error } = await supa.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-login"></i> Entrar';
  if (error) { err.textContent = 'E-mail ou senha incorretos.'; err.classList.add('show'); return; }
  await initApp();
}

function loginKey(e) { if (e.key === 'Enter') doLogin(); }

async function doLogout() {
  await supa.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-info').textContent = '';
  state.cols = [];
}

// ── Load data from Supabase ──
async function loadBoard() {
  const { data: cols, error: ce } = await supa.from('columns').select('*').order('position');
  if (ce) { showToast('Erro ao carregar colunas'); return; }

  const { data: cards, error: ke } = await supa.from('cards').select('*').order('position');
  if (ke) { showToast('Erro ao carregar tarefas'); return; }

  state.cols = cols.map(c => ({
    id: c.id, name: c.name, color: c.color, position: c.position,
    cards: cards
      .filter(k => k.column_id === c.id)
      .map(k => ({
        id: k.id, title: k.title, tag: k.tag || '',
        tagCls: k.tag_cls || 'tag-blue', avatar: k.avatar || 0,
        priority: k.priority || 'medium', position: k.position || 0,
        column_id: k.column_id
      }))
      .sort((a,b) => a.position - b.position)
  }));
}

// ── Init ──
async function initApp() {
  showLoading(true);
  const { data: { session } } = await supa.auth.getSession();
  if (!session) {
    showLoading(false);
    document.getElementById('login-screen').style.display = 'flex';
    return;
  }
  document.getElementById('user-info').textContent = session.user.email;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  await loadBoard();
  render();
  showLoading(false);
}

// ── Render ──
function renderPri(p) {
  const pr = PRIORITIES.find(x=>x.id===p) || PRIORITIES[2];
  return `<span class="pri-badge ${pr.badge}"><span class="pri-dot" style="background:${pr.dot}"></span>${pr.label}</span>`;
}

function renderCard(card, colId) {
  const av = AVATARS[card.avatar % 4];
  return `<div class="card" draggable="true" data-card="${card.id}" data-col="${colId}" data-priority="${card.priority}">
    <div class="card-top">${renderPri(card.priority)}<div class="card-actions"><button class="card-btn" onclick="deleteCard('${colId}','${card.id}')" aria-label="Remover"><i class="ti ti-x"></i></button></div></div>
    <div class="card-title">${esc(card.title)}</div>
    <div class="card-meta">${card.tag?`<span class="tag ${card.tagCls}">${esc(card.tag)}</span>`:''}<div class="avatar ${av.c}">${av.i}</div></div>
  </div>`;
}

function renderForm(colId) {
  const opts = PRIORITIES.map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
  return `<div class="new-card-form" id="form-${colId}">
    <input type="text" placeholder="Título da tarefa..." id="inp-${colId}" maxlength="120" onkeydown="formKey(event,'${colId}')">
    <select id="pri-${colId}">${opts}</select>
    <div class="form-row">
      <button class="form-btn primary" onclick="saveCard('${colId}')">Adicionar</button>
      <button class="form-btn cancel"  onclick="cancelForm('${colId}')">Cancelar</button>
    </div>
  </div>`;
}

function renderCol(col) {
  return `<div class="col" id="${col.id}" data-col="${col.id}">
    <div class="col-header">
      <div class="col-label">
        <span class="col-dot" style="background:${col.color}"></span>
        <span>${esc(col.name)}</span>
        <span class="col-count">${col.cards.length}</span>
      </div>
      <button class="col-add-btn" onclick="showAddCard('${col.id}')" aria-label="Adicionar tarefa"><i class="ti ti-plus"></i></button>
    </div>
    ${col.cards.map(c=>renderCard(c,col.id)).join('')}
    ${col._addingCard ? renderForm(col.id) : ''}
    ${!col._addingCard ? `<button class="add-card-btn" onclick="showAddCard('${col.id}')"><i class="ti ti-plus"></i> Adicionar tarefa</button>` : ''}
  </div>`;
}

function renderAddColArea() {
  if (state._addingCol) return `<div class="new-col-form">
    <input type="text" placeholder="Nome da coluna..." id="col-inp" maxlength="40" onkeydown="colFormKey(event)">
    <div class="form-row">
      <button class="form-btn primary" onclick="saveCol()">Criar</button>
      <button class="form-btn cancel"  onclick="cancelCol()">Cancelar</button>
    </div>
  </div>`;
  return `<div class="add-col-area" onclick="showAddCol()"><span><i class="ti ti-plus"></i> Nova coluna</span></div>`;
}

function renderStats() {
  const el = document.getElementById('stats');
  const c = {urgent:0,high:0,medium:0,low:0};
  state.cols.forEach(col => col.cards.forEach(k => { if(c[k.priority]!==undefined) c[k.priority]++; }));
  const total = Object.values(c).reduce((a,b)=>a+b,0);
  el.innerHTML = `
    <div class="stat"><i class="ti ti-layout-kanban"></i>${state.cols.length} colunas</div>
    <div class="stat"><i class="ti ti-checklist"></i>${total} tarefas</div>
    <div class="stat"><span class="pri-dot" style="background:#f87171;display:inline-block"></span>${c.urgent} urgente${c.urgent!==1?'s':''}</div>
    <div class="stat"><span class="pri-dot" style="background:#fbbf24;display:inline-block"></span>${c.high} alta${c.high!==1?'s':''}</div>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn.f-'+f).classList.add('active');
  applyFilter(); renderStats();
}

function applyFilter() {
  document.querySelectorAll('.card').forEach(el => {
    el.classList.toggle('hidden', activeFilter!=='all' && el.dataset.priority!==activeFilter);
  });
  document.querySelectorAll('.col').forEach(colEl => {
    const visible = colEl.querySelectorAll('.card:not(.hidden)').length;
    let empty = colEl.querySelector('.empty-col');
    const hasForm = !!colEl.querySelector('.new-card-form');
    if (activeFilter!=='all' && visible===0 && !hasForm) {
      if (!empty) { empty=document.createElement('div'); empty.className='empty-col'; empty.textContent='Nenhuma tarefa'; colEl.insertBefore(empty, colEl.querySelector('.add-card-btn')); }
    } else { if(empty) empty.remove(); }
  });
}

function render() {
  const board = document.getElementById('board');
  if (!board) return;
  board.innerHTML = state.cols.map(renderCol).join('') + renderAddColArea();
  renderStats(); applyFilter(); attachDrag();
  state.cols.forEach(col => { if(col._addingCard) { const i=document.getElementById('inp-'+col.id); if(i) i.focus(); }});
  if (state._addingCol) { const i=document.getElementById('col-inp'); if(i) i.focus(); }
}

// ── Card actions ──
function showAddCard(colId) { state.cols.forEach(c=>c._addingCard=(c.id===colId)); render(); }
function cancelForm(colId)  { const c=state.cols.find(x=>x.id===colId); if(c) c._addingCard=false; render(); }

async function saveCard(colId) {
  const inp = document.getElementById('inp-'+colId);
  const pri = document.getElementById('pri-'+colId);
  const title = inp ? inp.value.trim() : '';
  if (!title) return;
  const col = state.cols.find(c=>c.id===colId);
  if (!col) return;
  const newCard = {
    id: uid(), title, tag: '', tag_cls: TAG_CLASSES[Math.floor(Math.random()*TAG_CLASSES.length)],
    avatar: Math.floor(Math.random()*4), priority: pri ? pri.value : 'medium',
    column_id: colId, position: col.cards.length
  };
  const { error } = await supa.from('cards').insert([newCard]);
  if (error) { showToast('Erro ao salvar tarefa'); return; }
  col.cards.push({ id:newCard.id, title:newCard.title, tag:'', tagCls:newCard.tag_cls, avatar:newCard.avatar, priority:newCard.priority, position:newCard.position });
  col._addingCard = false;
  showToast('Tarefa adicionada ✓');
  render();
}

function formKey(e, colId) { if(e.key==='Enter') saveCard(colId); if(e.key==='Escape') cancelForm(colId); }

async function deleteCard(colId, cardId) {
  const { error } = await supa.from('cards').delete().eq('id', cardId);
  if (error) { showToast('Erro ao remover tarefa'); return; }
  const col = state.cols.find(c=>c.id===colId);
  if (col) col.cards = col.cards.filter(c=>c.id!==cardId);
  showToast('Tarefa removida');
  render();
}

// ── Column actions ──
function showAddCol() { state._addingCol = true; render(); }
function cancelCol()  { state._addingCol = false; render(); }

async function saveCol() {
  const inp  = document.getElementById('col-inp');
  const name = inp ? inp.value.trim() : '';
  if (!name) return;
  const newCol = { id: cuid(), name, color: COL_COLORS[state.cols.length % COL_COLORS.length], position: state.cols.length };
  const { error } = await supa.from('columns').insert([newCol]);
  if (error) { showToast('Erro ao criar coluna'); return; }
  state.cols.push({ ...newCol, cards: [] });
  state._addingCol = false;
  showToast('Coluna criada ✓');
  render();
}

function colFormKey(e) { if(e.key==='Enter') saveCol(); if(e.key==='Escape') cancelCol(); }

// ── Drag & drop ──
function attachDrag() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragCard = e.currentTarget.dataset.card;
      dragCol  = e.currentTarget.dataset.col;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', e => {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('.col').forEach(col => {
    col.addEventListener('dragover',  e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); });
    col.addEventListener('dragleave', e => e.currentTarget.classList.remove('drag-over'));
    col.addEventListener('drop', async e => {
      e.preventDefault();
      const tId = e.currentTarget.dataset.col;
      e.currentTarget.classList.remove('drag-over');
      if (!dragCard || !dragCol || dragCol === tId) return;
      const src = state.cols.find(c=>c.id===dragCol);
      const tgt = state.cols.find(c=>c.id===tId);
      if (!src || !tgt) return;
      const idx = src.cards.findIndex(c=>c.id===dragCard);
      if (idx === -1) return;
      const [card] = src.cards.splice(idx, 1);
      card.column_id = tId;
      tgt.cards.push(card);
      render();
      // Salva no banco
      const { error } = await supa.from('cards').update({ column_id: tId, position: tgt.cards.length - 1 }).eq('id', dragCard);
      if (error) { showToast('Erro ao mover tarefa'); await loadBoard(); render(); }
      else showToast('Tarefa movida ✓');
    });
  });
}

// ── Boot ──
initApp();
</script>
</body>
</html>
